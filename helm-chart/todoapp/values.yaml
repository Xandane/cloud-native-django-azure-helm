# Namespace
namespace: todoapp-ns
# Secrets
secrets:
  DB_HOST: "mysql"
  DB_NAME: "todoapp"
  DB_USER: "admin"
  DB_PASSWORD: "password123"
# Image
image:
  repository: nginx
  tag: "1.25"
  pullPolicy: IfNotPresent
# Replica count
replicaCount: 2
# RollingUpdate
rollingUpdate:
  maxSurge: 1
  maxUnavailable: 0
# Resources
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi
# Affinity
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: app
          operator: In
          values:
          - todoapp
# HPA
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
# PV/PVC
persistence:
  pv:
    capacity: 1Gi
  pvc:
    requests:
      storage: 500Mi
# Service Account
serviceAccount:
  create: true
  name: todoapp-sa
# Service
service:
  type: ClusterIP
  port: 8000
# Ingress
ingress:
  enabled: false
# HTTPRoute
httpRoute:
  enabled: false