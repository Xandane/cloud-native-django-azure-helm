# values.yaml for mysql
namespace: todoapp-ns
image:
  repository: mysql
  tag: "8.0"
replicaCount: 1
resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"
pvc:
  requests:
    storage: 2Gi
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: app
              operator: In
              values:
                - mysql
tolerations:
  - key: "app"
    operator: "Equal"
    value: "mysql"
    effect: "NoSchedule"
secrets:
  MYSQL_ROOT_PASSWORD: rootpassword
  MYSQL_DATABASE: todoapp
  MYSQL_USER: todoapps
  MYSQL_PASSWORD: password

